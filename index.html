<style>
  :root {
    --bg: #f3ece0;
    --bg-deep: #ebe2d2;
    --paper: #fbf7ef;
    --ink: #1a1f2c;
    --ink-soft: #4a4f5c;
    --ink-mute: #8a8578;
    --rule: #d9cfb9;
    --rule-strong: #1a1f2c;
    --gold: #b8893a;
    --gold-deep: #8a6420;
    --blue: #1d3a6e;
    --blue-deep: #0f1f3d;
    --red: #b03a2e;
  }
  [data-theme="navy"] {
    --bg: #0f1a2e;
    --bg-deep: #0a1224;
    --paper: #16243f;
    --ink: #f3ece0;
    --ink-soft: #c9c0a8;
    --ink-mute: #7e8499;
    --rule: #2a3a5a;
    --rule-strong: #f3ece0;
    --gold: #d6a64e;
    --gold-deep: #b8893a;
    --blue: #6b8fc9;
    --blue-deep: #a3b8db;
    --red: #e07a6e;
  }
  [data-theme="campaign"] {
    --bg: #f4f7fc;
    --bg-deep: #e6edf8;
    --paper: #ffffff;
    --ink: #0a1f44;
    --ink-soft: #2d3e5e;
    --ink-mute: #6a7a96;
    --rule: #c5d3e8;
    --rule-strong: #0a1f44;
    --gold: #c8a13a;
    --gold-deep: #8a6420;
    --blue: #1556c4;
    --blue-deep: #0a3aa0;
    --red: #c2392a;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    line-height: 1.5;
  }
  .serif { font-family: "Noto Serif KR", "Pretendard Variable", serif; font-weight: 700; }
  .mono { font-family: "DM Mono", ui-monospace, "SF Mono", monospace; }

  /* layout */
  .page {
    max-width: 560px;
    margin: 0 auto;
    background: var(--paper);
    min-height: 100vh;
    position: relative;
    box-shadow: 0 0 0 1px var(--rule), 0 30px 60px -20px rgba(0,0,0,0.12);
  }
  @media (min-width: 600px) {
    body { padding: 24px 0; background: var(--bg-deep); }
    .page { border-radius: 4px; }
  }
  /* 데스크탑(768px 이상)에서는 페이지 폭을 넓혀 2열 카드 그리드를 수용하고, 모바일에서는 기존 좁은 1열 레이아웃을 유지 */
  @media (min-width: 768px) {
    .page { max-width: 900px; }
    .videos {
      display: grid !important;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }
    .video {
      border-bottom: none;
      border-right: 1px dashed var(--rule);
    }
    .video:nth-child(2n) { border-right: none; }
    /* 2열 그리드 행 사이 구분선 */
    .video:nth-child(n+3) { border-top: 1px dashed var(--rule); }
  }

  /* sticky share bar */
  .sharebar {
    position: sticky; top: 0; z-index: 50;
    background: var(--paper);
    border-bottom: 1px solid var(--rule);
    display: flex; align-items: center; gap: 8px;
    padding: 10px 16px;
    backdrop-filter: blur(8px);
  }
  .sharebar .brand { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-mute); flex: 1; }
  .sharebtn {
    appearance: none; border: 1px solid var(--rule-strong); background: transparent;
    color: var(--ink); font-family: inherit; font-size: 12px; font-weight: 600;
    padding: 7px 10px; border-radius: 999px; cursor: pointer; letter-spacing: 0.02em;
    display: inline-flex; align-items: center; gap: 5px;
    transition: background 120ms, color 120ms;
  }
  .sharebtn:hover { background: var(--rule-strong); color: var(--paper); }
  .sharebtn.primary { background: var(--rule-strong); color: var(--paper); }
  .sharebtn.primary:hover { background: var(--ink-soft); }

  /* hero */
  .hero {
    padding: 36px 24px 28px;
    border-bottom: 2px solid var(--rule-strong);
    background: var(--paper);
    position: relative;
  }
  .hero::before {
    content: ""; position: absolute; left: 24px; right: 24px; top: 18px; height: 1px; background: var(--rule-strong);
  }
  .hero::after {
    content: ""; position: absolute; left: 24px; right: 24px; bottom: 14px; height: 1px; background: var(--rule-strong);
  }
  .hero .kicker {
    text-align: center;
    font-family: "Noto Serif KR", serif;
    font-size: clamp(11px, 3.5vw, 14px);
    font-weight: 500;
    color: var(--ink-soft);
    margin-bottom: 18px;
    word-break: keep-all;
  }
  .hero .stars {
    text-align: center; color: var(--gold);
    font-size: 28px; letter-spacing: 0.2em; margin-bottom: 8px;
    line-height: 1;
  }
  .hero h1 {
    font-family: "Noto Serif KR", serif; font-weight: 900;
    text-align: center; font-size: clamp(28px, 9vw, 38px); line-height: 1.15;
    margin: 0 0 6px; letter-spacing: -0.02em;
    color: var(--ink);
  }
  .hero h1 .accent { color: var(--gold-deep); font-style: italic; }
  .hero .edition {
    text-align: center;
    margin-top: 18px; font-size: clamp(9px, 2.8vw, 11px); letter-spacing: 0.24em; text-transform: uppercase;
    color: var(--ink-mute);
  }

  /* intro */
  .intro {
    padding: 24px 24px 28px;
    border-bottom: 1px solid var(--rule);
    text-align: center;
  }
  .intro .quote {
    font-family: "Noto Serif KR", serif;
    font-size: clamp(14px, 4.5vw, 17px); line-height: 1.55; color: var(--ink);
    margin: 0 auto;
    max-width: 100%;
    word-break: keep-all;
  }
  .intro .quote .em { color: var(--red); font-weight: 700; }
  .intro .meta {
    margin-top: 16px;
    font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--ink-mute);
    display: flex; gap: 10px; justify-content: center; align-items: center;
  }
  .intro .meta .dot { width: 4px; height: 4px; background: var(--ink-mute); border-radius: 50%; }
  .intro .cheer {
    margin-top: 14px; font-size: 13px; font-weight: 700; color: var(--blue);
    letter-spacing: 0.02em;
  }

  /* table of contents */
  .toc {
    padding: 20px 24px;
    border-bottom: 1px solid var(--rule);
    background: var(--bg);
  }
  .toc-title {
    font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase;
    color: var(--ink-mute); margin-bottom: 12px;
  }
  .toc-list { display: flex; flex-direction: column; gap: 8px; }
  .toc-row {
    display: flex; align-items: baseline; gap: 8px;
    font-size: 13px; cursor: pointer;
    background: none; border: none; padding: 0; text-align: left;
    color: var(--ink); font-family: inherit;
  }
  .toc-row:hover .toc-name { text-decoration: underline; text-underline-offset: 3px; }
  .toc-row .toc-date { font-family: "DM Mono", monospace; color: var(--ink-mute); font-size: 12px; }
  .toc-row .toc-name { flex: 1; font-weight: 600; }
  .toc-row .toc-dots { flex: 1; border-bottom: 1px dotted var(--rule); align-self: center; height: 1px; min-width: 12px; }
  .toc-row .toc-count { font-family: "DM Mono", monospace; color: var(--ink-soft); font-size: 12px; }

  /* section */
  .section {
    padding: 36px 0 12px;
    border-bottom: 1px solid var(--rule);
  }
  .section-header {
    padding: 0 24px 24px;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 24px;
    text-align: center;
  }
  .section-header .date {
    font-family: "DM Mono", monospace;
    font-size: 12px; letter-spacing: 0.16em; color: var(--ink-mute);
    margin-bottom: 8px;
  }
  .section-header .station {
    display: inline-block;
    font-family: "Noto Serif KR", serif; font-weight: 900;
    font-size: 28px; letter-spacing: 0.04em;
    color: var(--ink);
    border-top: 2px solid var(--rule-strong);
    border-bottom: 2px solid var(--rule-strong);
    padding: 8px 22px;
    margin: 4px 0;
  }
  .section-header .label {
    font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase;
    color: var(--ink-soft); margin-top: 8px;
  }

  /* video cards */
  .videos { display: flex; flex-direction: column; gap: 0; padding: 0 0 8px; }
  .video {
    padding: 0 24px 32px;
    border-bottom: 1px dashed var(--rule);
    margin-bottom: 24px;
  }
  .video:last-child { border-bottom: none; margin-bottom: 0; }
  .video-head {
    display: flex; align-items: flex-start; gap: 14px;
    margin-bottom: 12px;
  }
  .video-num {
    flex-shrink: 0;
    font-family: "Noto Serif KR", serif;
    font-weight: 900;
    font-size: clamp(30px, 9vw, 38px);
    line-height: 0.9;
    color: var(--gold-deep);
    font-style: italic;
    width: clamp(36px, 10vw, 44px);
  }
  .video-titlewrap { flex: 1; min-width: 0; }
  .video-stars {
    color: var(--gold); font-size: 12px; letter-spacing: 0.15em;
    margin-bottom: 4px;
  }
  .video-title {
    font-family: "Noto Serif KR", serif; font-weight: 700;
    font-size: clamp(16px, 4.5vw, 19px); line-height: 1.3; color: var(--ink);
    margin: 0; letter-spacing: -0.01em;
    text-wrap: pretty;
  }
  .video-desc {
    font-size: 13px; line-height: 1.55; color: var(--ink-soft);
    margin: 8px 0 14px;
    font-style: italic;
    border-left: 2px solid var(--rule);
    padding-left: 10px;
  }

  .thumb {
    display: block; position: relative;
    aspect-ratio: 16 / 9;
    background: var(--ink); color: var(--paper);
    overflow: hidden;
    text-decoration: none;
    border: 1px solid var(--rule);
  }
  .thumb img {
    width: 100%; height: 100%; object-fit: cover; display: block;
    transition: transform 300ms ease;
  }
  .thumb:hover img { transform: scale(1.03); }
  .thumb .play {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 56px; height: 56px; border-radius: 50%;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    display: grid; place-items: center;
    border: 2px solid rgba(255,255,255,0.9);
    transition: background 160ms, transform 160ms;
  }
  .thumb:hover .play { background: var(--red); transform: translate(-50%,-50%) scale(1.06); }
  .thumb .play::before {
    content: ""; display: block;
    border-left: 16px solid #fff;
    border-top: 10px solid transparent;
    border-bottom: 10px solid transparent;
    margin-left: 4px;
  }
  .thumb .tag {
    position: absolute; top: 10px; left: 10px;
    background: var(--paper); color: var(--ink);
    font-family: "DM Mono", monospace; font-size: 10px; font-weight: 600;
    padding: 3px 7px; letter-spacing: 0.1em;
    border: 1px solid var(--rule-strong);
  }
  .thumb .duration {
    position: absolute; bottom: 10px; right: 10px;
    background: rgba(0,0,0,0.8); color: #fff;
    font-family: "DM Mono", monospace; font-size: 11px; font-weight: 500;
    padding: 3px 6px;
  }

  .video-cta {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 12px;
    gap: 12px;
  }
  .video-cta .watch {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 700; color: var(--ink);
    text-decoration: none;
    border-bottom: 1.5px solid var(--ink);
    padding-bottom: 1px;
  }
  .video-cta .watch:hover { color: var(--red); border-color: var(--red); }
  .video-cta .watch .arrow { font-family: "DM Mono", monospace; }
  .video-cta .share {
    display: inline-flex; gap: 6px;
  }
  .icon-btn {
    appearance: none; background: transparent; border: 1px solid var(--rule);
    width: 30px; height: 30px; border-radius: 50%;
    cursor: pointer; color: var(--ink-soft);
    display: grid; place-items: center;
    font-size: 11px; font-weight: 600;
    transition: all 120ms;
    font-family: inherit;
    padding: 0;
  }
  .icon-btn:hover { border-color: var(--ink); color: var(--ink); background: var(--bg); }
  .icon-btn.copied { background: var(--gold); color: var(--paper); border-color: var(--gold); }

  /* outro / cta */
  .outro {
    padding: 36px 24px 28px;
    text-align: center;
    background: var(--bg);
    border-bottom: 1px solid var(--rule);
  }
  .outro .stars { color: var(--gold); font-size: 20px; letter-spacing: 0.2em; margin-bottom: 14px; }
  .outro h2 {
    font-family: "Noto Serif KR", serif; font-weight: 900;
    font-size: 24px; line-height: 1.25;
    margin: 0 0 8px;
  }
  .outro p {
    font-size: 14px; color: var(--ink-soft);
    margin: 0 0 22px;
  }
  .outro .cta-stack { display: flex; flex-direction: column; gap: 10px; max-width: 280px; margin: 0 auto; }
  .outro .cta {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 14px 18px;
    font-size: 14px; font-weight: 700;
    border: 1.5px solid var(--rule-strong);
    background: var(--rule-strong); color: var(--paper);
    text-decoration: none; cursor: pointer;
    font-family: inherit;
    transition: opacity 120ms, transform 120ms;
  }
  .outro .cta:hover { opacity: 0.88; }
  .outro .cta.secondary { background: transparent; color: var(--ink); }
  .outro .cta.secondary:hover { background: var(--paper); }

  /* footer */
  .pagefoot {
    padding: 22px 24px 32px;
    text-align: center;
    background: var(--paper);
  }
  .pagefoot .marks { color: var(--gold); font-size: 14px; letter-spacing: 0.3em; }
  .pagefoot .credit {
    font-family: "DM Mono", monospace;
    font-size: 10px; letter-spacing: 0.2em; color: var(--ink-mute);
    margin-top: 10px;
    text-transform: uppercase;
  }
  .pagefoot .heart { color: var(--blue); }

  /* toast */
  .toast {
    position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%);
    background: var(--rule-strong); color: var(--paper);
    padding: 10px 16px; font-size: 13px; font-weight: 600;
    border-radius: 999px; z-index: 100;
    opacity: 0; pointer-events: none;
    transition: opacity 200ms, transform 200ms;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }

  /* legend bar */
  .legend {
    display: flex; align-items: center; justify-content: center; gap: clamp(4px, 1.5vw, 10px);
    padding: 10px 12px; background: var(--bg-deep);
    font-family: "DM Mono", monospace; font-size: clamp(8.5px, 2.2vw, 10px);
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--ink-soft);
    border-bottom: 1px solid var(--rule);
    white-space: nowrap;
  }
  .legend .star { color: var(--gold); letter-spacing: 0.1em; }
</style>
</head>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // deck-stage enables its rail in connectedCallback, but this panel can
  // mount before that element has upgraded. The initial read catches the
  // common case; the listener covers mounting first. (Older deck-stage.js
  // copies still wait for the host's __omelette_rail_enabled postMessage —
  // same listener handles those.)
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});
</script>

    label: "KBS 강원도지사 후보 토론회",
    videos: [
      { n: 1, title: "하다하다 할 게 없어서 남의 아버지 파묘?", desc: "얼마나 부정하고 싶으신 건지 감도 안 옵니다..", id: "f1bJKXHzuhA", stars: 3 },
      { n: 2, title: "공약 못 지킨 이유 물었더니 강릉시장 탓?", desc: "남탓만 하는 김진태 후보 .. 어떻게 해야 하나요", id: "B5IOQk9TECs", stars: 3 },
      { n: 3, title: "그때는 틀리고 지금은 맞다?", desc: "과거의 김진태와 싸우는 현재의 김진태", id: "LWdkiNbd28c", stars: 3 },
      { n: 4, title: "김진태 후보님, 적절한 비유가 아니십니다..", desc: "테슬라, 현대차, 그리고……", id: "NrQ15H2joHw", stars: 3 },
    ]
  },
  {
    id: "mbc-0514",
    date: "5.14 (목)",
    station: "MBC",
    label: "MBC 강원도지사 후보 토론회",
    videos: [
      { n: 1, title: "허위사실 유포 고발이 야박..하다고요??", desc: "동서고속철도 허위사실 고발에 감정호소하는 김진태", id: "I9UT8QOcTWw", stars: 3 },
      { n: 2, title: "그때 왜 전화(콜백) 안 줬어요?", desc: "정무수석 전화 기다리던 김진태 도지사…", id: "YKsrMoADh0Y", stars: 3 },
    ]
  }
];

const PAGE_URL = (typeof window !== "undefined" && window.location.href) || "";
const SHARE_TEXT = "전국에서 소문난 토론 맛집, 우상호 후보의 쓰리스타급 토론 컬렉션 💙";

function thumbUrl(id) {
  return `https://i.ytimg.com/vi/${id}/hqdefault.jpg`;
}
function shortUrl(id) {
  return `https://youtube.com/shorts/${id}`;
}

function Stars({ n = 3 }) {
  return <span className="video-stars" aria-label={`${n}성`}>{"★".repeat(n)}{"☆".repeat(3-n)}</span>;
}

function ShareBar({ onShare, onCopy, copied }) {
  return (
    <div className="sharebar">
      <span className="brand">★★★ 토론 맛집 가이드</span>
      <button className="sharebtn" onClick={onCopy}>{copied ? "복사 완료" : "링크복사"}</button>
      <button className="sharebtn primary" onClick={onShare}>공유하기</button>
    </div>
  );
}

function Toast({ message, show }) {
  return <div className={`toast ${show ? "show" : ""}`}>{message}</div>;
}

function Video({ v, sectionLabel, onCopyOne, copiedId, showStars }) {
  const url = shortUrl(v.id);
  return (
    <article className="video" id={`v-${v.id}`}>
      <div className="video-head">
        <div className="video-num">{String(v.n).padStart(2,"0")}</div>
        <div className="video-titlewrap">
          {showStars && <Stars n={v.stars} />}
          <h3 className="video-title">{v.title}</h3>
        </div>
      </div>
      <p className="video-desc">“{v.desc}”</p>
      <a className="thumb" href={url} target="_blank" rel="noopener noreferrer" aria-label={`${v.title} 쇼츠 열기`}>
        <span className="tag">SHORTS</span>
        <img src={thumbUrl(v.id)} alt="" loading="lazy" onError={(e)=>{
          if(!e.currentTarget.dataset.fallback){
            e.currentTarget.dataset.fallback = "1";
            e.currentTarget.src = `https://i.ytimg.com/vi/${v.id}/mqdefault.jpg`;
          }
        }} />
        <span className="play" aria-hidden="true"></span>
        <span className="duration">SHORTS</span>
      </a>
      <div className="video-cta">
        <a className="watch" href={url} target="_blank" rel="noopener noreferrer">
          쇼츠 보러가기 <span className="arrow">→</span>
        </a>
        <div className="share">
          <button className={`icon-btn ${copiedId===v.id?"copied":""}`} title="이 영상 링크 복사"
            onClick={()=>onCopyOne(v.id, url, `[${sectionLabel}] ${v.title}`)}>
            {copiedId===v.id ? "✓" : "🔗"}
          </button>
          <a className="icon-btn" title="텔레그램으로 공유"
            href={`https://t.me/share/url?url=${encodeURIComponent(url)}&text=${encodeURIComponent(`[${sectionLabel}] ${v.title}\n\n${v.desc}`)}`}
            target="_blank" rel="noopener noreferrer">✈</a>
        </div>
      </div>
    </article>
  );
}

function Section({ s, showStars, onCopyOne, copiedId }) {
  return (
    <section className="section" id={s.id}>
      <header className="section-header">
        <div className="date">— {s.date} —</div>
        <div className="station">{s.station}</div>
        <div className="label">{s.label}</div>
      </header>
      <div className="videos">
        {s.videos.map(v => (
          <Video key={v.id} v={v} sectionLabel={`${s.date} ${s.station}`}
            showStars={showStars} onCopyOne={onCopyOne} copiedId={copiedId} />
        ))}
      </div>
    </section>
  );
}

function TOC({ data }) {
  return (
    <nav className="toc" aria-label="목차">
      <div className="toc-title">CONTENTS · 코스 안내</div>
      <div className="toc-list">
        {data.map((s, i) => (
          <button key={s.id} className="toc-row" onClick={()=>{
            const el = document.getElementById(s.id);
            if(el) window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 8, behavior: "smooth" });
          }}>
            <span className="toc-date">{s.date}</span>
            <span className="toc-name">{s.station} 후보 토론회</span>
            <span className="toc-dots"></span>
            <span className="toc-count">{String(s.videos.length).padStart(2,"0")}편</span>
          </button>
        ))}
      </div>
    </nav>
  );
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [toast, setToast] = useState(null);
  const [copiedId, setCopiedId] = useState(null);
  const [copiedTop, setCopiedTop] = useState(false);

  useEffect(() => {
    document.documentElement.setAttribute("data-theme", t.theme);
  }, [t.theme]);

  const showToastMsg = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 1800);
  };

  const handleShareTop = async () => {
    const text = SHARE_TEXT;
    const url = PAGE_URL || "";
    if (navigator.share) {
      try {
        await navigator.share({ title: "토론 맛집 가이드", text, url });
        return;
      } catch (e) { /* user cancelled */ }
    }
    window.open(`https://t.me/share/url?url=${encodeURIComponent(url)}&text=${encodeURIComponent(text)}`, "_blank", "noopener");
  };
  const handleCopyTop = async () => {
    try {
      await navigator.clipboard.writeText(`${SHARE_TEXT}\n${PAGE_URL}`);
      setCopiedTop(true); showToastMsg("링크가 복사됐어요");
      setTimeout(()=>setCopiedTop(false), 1500);
    } catch { showToastMsg("복사 실패"); }
  };
  const handleCopyOne = async (id, url, title) => {
    try {
      await navigator.clipboard.writeText(`${title}\n${url}`);
      setCopiedId(id); showToastMsg("영상 링크가 복사됐어요");
      setTimeout(()=>setCopiedId(null), 1500);
    } catch { showToastMsg("복사 실패"); }
  };

  const totalCount = useMemo(() => DATA.reduce((a,b)=>a+b.videos.length, 0), []);

  return (
    <div className="page" data-screen-label="01 Guide">
      <ShareBar onShare={handleShareTop} onCopy={handleCopyTop} copied={copiedTop} />

      <div className="legend">
        <span>EDITION 03</span><span>·</span>
        <span><span className="star">★★★</span> 강원 토론 컬렉션</span><span>·</span>
        <span>{totalCount.toString().padStart(2,"0")} SHORTS</span>
      </div>

      <header className="hero">
        <div className="kicker">{t.kicker}</div>
        <div className="stars">★ ★ ★</div>
        <h1>전국에서 소문난<br/><span className="accent">토론 맛집</span></h1>
        <div className="edition">강원도지사 후보 · 2026 EDITION</div>
      </header>

      <section className="intro">
        <p className="quote">
          150만 <span className="em">강원도민 모두에게</span><br/>
          도달하는 그날까지<br/>
          아껴보지 말고 <span className="em">나눠보고 돌려보고 다시보기!</span>
        </p>
        <div className="meta">
          <span>{DATA.length}회 토론</span>
          <span className="dot"></span>
          <span>{totalCount}편 쇼츠</span>
          <span className="dot"></span>
          <span>3개 방송사</span>
        </div>
        <div className="cheer">💙 함께 퍼날 ! 함께 응원! 💙</div>
      </section>

      {t.showToc && <TOC data={DATA} />}

      {DATA.map(s => (
        <Section key={s.id} s={s} showStars={t.showStars}
          onCopyOne={handleCopyOne} copiedId={copiedId} />
      ))}

      <section className="outro">
        <div className="stars">★ ★ ★</div>
        <h2>이 글을 본 당신,<br/>이제 셰프가 될 차례.</h2>
        <p>지금 이 페이지를 단톡방으로,<br/>가족·친구·이웃에게 전해주세요.</p>
        <div className="cta-stack">
          <button className="cta" onClick={handleShareTop}>✈ 텔레그램으로 공유하기</button>
          <button className="cta secondary" onClick={handleCopyTop}>{copiedTop ? "✓ 링크 복사 완료" : "🔗 페이지 링크 복사"}</button>
        </div>
      </section>

      <footer className="pagefoot">
        <div className="marks">★ ★ ★</div>
        <div className="credit">함께 퍼날 <span className="heart">·</span> 함께 응원 <span className="heart">·</span> 함께 강원</div>
      </footer>

      <Toast message={toast || ""} show={!!toast} />

      <TweaksPanel title="Tweaks">
        <TweakSection title="테마">
          <TweakRadio
            label="컬러 톤"
            value={t.theme}
            onChange={(v)=>setTweak("theme", v)}
            options={[
              { value: "guide", label: "가이드" },
              { value: "navy", label: "다크" },
              { value: "campaign", label: "캠페인" },
            ]}
          />
        </TweakSection>
        <TweakSection title="구성">
          {/* TweakToggle 컴포넌트는 내부적으로 value 프로퍼티를 통해 활성화 상태를 제어하므로, HTML 기본 checked 속성 대신 value를 사용하여 올바른 스위치 UI 상태(온/오프 시각 피드백)가 렌더링되도록 합니다. */}
          <TweakToggle label="목차 노출" value={t.showToc} onChange={(v)=>setTweak("showToc", v)} />
          <TweakToggle label="별점 표시" value={t.showStars} onChange={(v)=>setTweak("showStars", v)} />
          <TweakText label="상단 키커" value={t.kicker} onChange={(v)=>setTweak("kicker", v)} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
